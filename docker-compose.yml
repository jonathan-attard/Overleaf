services:
  sharelatex:
    restart: always
    image: rigon/sharelatex-full
    container_name: sharelatex
    user: root # Required on Windows/WSL to access the docker.sock
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - 80:80
    stop_grace_period: 60s
    volumes:
      - ~/sharelatex_data:/var/lib/overleaf
      # UNCOMMENTED: Allows Overleaf to trigger the compiler container
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      OVERLEAF_APP_NAME: Overleaf Community Edition
      OVERLEAF_MONGO_URL: mongodb://mongo/sharelatex
      OVERLEAF_REDIS_HOST: redis
      REDIS_HOST: redis
      ENABLED_LINKED_FILE_TYPES: "project_file,project_output_file"
      ENABLE_CONVERSIONS: "true"
      EMAIL_CONFIRMATION_DISABLED: "true"

      ################
      ## Sandboxed Compiles Fixes
      ################
      SANDBOXED_COMPILES: "false"
      # Using relative paths to avoid PowerShell variable issues
      SANDBOXED_COMPILES_HOST_DIR_COMPILES: "./sharelatex_data/data/compiles"
      SANDBOXED_COMPILES_HOST_DIR_OUTPUT: "./sharelatex_data/data/output"

      DOCKER_RUNNER: "false"
      SANDBOXED_COMPILES_SIBLING_CONTAINERS: "false"
  mongo:
    restart: always
    image: mongo:8.0
    container_name: mongo
    # Explicitly set the replSet AND a memory cap for stability on Windows
    command: [ "--replSet", "overleaf", "--wiredTigerCacheSizeGB", "0.5" ]
    volumes:
      - ~/mongo_data:/data/db
      - ./bin/shared/mongodb-init-replica-set.js:/docker-entrypoint-initdb.d/mongodb-init-replica-set.js
    environment:
      MONGO_INITDB_DATABASE: sharelatex
    extra_hosts:
      - mongo:127.0.0.1
    healthcheck:
      # Updated healthcheck for 8.0 compatibility
      test: mongosh --port 27017 --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    restart: always
    image: redis:6.2
    container_name: redis
    volumes:
      - ~/redis_data:/data
